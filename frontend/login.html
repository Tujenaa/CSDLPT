<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoXe – Đăng nhập</title>
  <link rel="stylesheet" href="/frontend/css/base.css" />
  <link rel="stylesheet" href="/frontend/css/auth.css" />
</head>
<body>

  <div class="auth-page">

    <!-- ══════════════════════════
         NAVBAR
    ══════════════════════════ -->
    

    <!-- ══════════════════════════
         AUTH CARD
    ══════════════════════════ -->
    <div class="auth-container">
      <div class="auth-card">

        <div class="auth-header">
          <h1>Chào mừng trở lại!</h1>
          <p>Đăng nhập để tiếp tục sử dụng GoXe</p>
        </div>

        <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">

          <!-- Phone / Email -->
          <div class="form-group">
            <label class="form-label" for="loginPhone">Số điện thoại hoặc Email</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.04 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/>
              </svg>
              <input class="form-input" type="text" id="loginPhone"
                     placeholder="VD: 0901234567" autocomplete="username" />
            </div>
            <span class="field-error" id="phoneError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Vui lòng nhập số điện thoại hoặc email
            </span>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="loginPass">Mật khẩu</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input class="form-input" type="password" id="loginPass"
                     placeholder="Nhập mật khẩu" autocomplete="current-password" />
              <button type="button" class="pass-toggle" onclick="togglePass('loginPass', this)">
                <svg id="eyeIcon-loginPass" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="passError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Vui lòng nhập mật khẩu
            </span>
          </div>

          <!-- Options -->
          <div class="form-options">
            <label class="checkbox-wrap">
              <input type="checkbox" id="rememberMe" />
              <span>Ghi nhớ đăng nhập</span>
            </label>
            <a class="forgot-link" href="#">Quên mật khẩu?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-auth" id="loginBtn">
            Đăng nhập
          </button>

          <!-- Switch -->
          <p class="auth-switch">
            Chưa có tài khoản? <a href="/frontend/register.html">Đăng ký ngay</a>
          </p>

        </form>
      </div>
    </div>

    <div class="auth-footer">
      © 2026 GoXe. Tất cả quyền được bảo lưu.
    </div>

  </div><!-- /.auth-page -->

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="/frontend/js/auth.js"></script>
</body>
</html>
