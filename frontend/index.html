<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoXe – Trang chủ</title>
  <link rel="stylesheet" href="/frontend/css/base.css" />
  <link rel="stylesheet" href="/frontend/css/layout.css" />
  <link rel="stylesheet" href="/frontend/css/profile.css" />
  <link rel="stylesheet" href="/frontend/css/index.css" />
  <style>
    
  </style>
</head>
<body>

  <div class="page-wrap">

    <!-- ══════════════════════════
         NAVBAR
    ══════════════════════════ -->
    <nav class="navbar">
      <div class="navbar-inner">

        <a class="logo" href="/frontend/index.html">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
          </div>
          <span class="logo-text">Go<span>Xe</span></span>
        </a>

        <div class="nav-links">
          <a href="index.html"><button class="nav-link active">Trang chủ</button></a>
          <button class="nav-link" onclick="showToast('Chức năng đang phát triển!')">Đặt xe</button>
          <button class="nav-link" onclick="window.location='/frontend/history.html'">Lịch sử</button>
          <button class="nav-link" onclick="showToast('Chức năng đang phát triển!')">Khuyến mãi</button>
          <button class="nav-link" onclick="showToast('Chức năng đang phát triển!')">Hỗ trợ</button>
        </div>

        <div class="nav-right">
          <button class="notif-btn" onclick="showToast('Bạn có 2 thông báo mới')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-dot"></span>
          </button>

          <div class="profile-dropdown-wrap">
            <button class="profile-btn" id="profileBtn" onclick="toggleDropdown()">
              <img
                class="profile-avatar"
                src="https://images.unsplash.com/photo-1569913486515-b74bf7751574?w=80&h=80&fit=crop"
                alt="avatar"
              />
              <span class="profile-name">Nguyễn Minh Anh</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="#9ca3af" stroke-width="2.5">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>

            <div class="profile-dropdown" id="profileDropdown">
              <div class="dropdown-header">
                <div class="dd-name">Nguyễn Minh Anh</div>
                <div class="dd-email">minhanh@gmail.com</div>
              </div>
              <a class="dropdown-item" href="/frontend/profile.html">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                Trang cá nhân
              </a>
              <button class="dropdown-item" onclick="showToast('Chức năng đang phát triển!')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M5.34 5.34l-1.41-1.41M12 2v2M12 20v2"/>
                </svg>
                Cài đặt
              </button>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item danger" onclick="handleLogout()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Đăng xuất
              </button>
            </div>
          </div>
        </div>

      </div>
    </nav>

    <!-- ══════════════════════════
         HERO
    ══════════════════════════ -->
    <div class="hero">
      <div class="hero-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>

      <h1>Tính năng đang được phát triển</h1>
      <p>Trang chủ GoXe sẽ sớm ra mắt. Trong lúc chờ đợi, bạn có thể xem lại lịch sử các chuyến đi của mình.</p>

      <a class="btn-goto-history" href="/frontend/history.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Xem lịch sử chuyến đi
      </a>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2800);
    }
    function toggleDropdown() {
      document.getElementById('profileDropdown').classList.toggle('show');
    }
    document.addEventListener('click', (e) => {
      const wrap = document.querySelector('.profile-dropdown-wrap');
      if (wrap && !wrap.contains(e.target)) {
        document.getElementById('profileDropdown')?.classList.remove('show');
      }
    });
    function handleLogout() {
      showToast('Đang đăng xuất...');
      setTimeout(() => { window.location = '/frontend/login.html'; }, 1000);
    }
  </script>

</body>
</html>
