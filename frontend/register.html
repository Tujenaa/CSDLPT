<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoXe – Đăng ký</title>
  <link rel="stylesheet" href="/frontend/css/base.css" />
  <link rel="stylesheet" href="/frontend/css/auth.css" />
</head>
<body>

  <div class="auth-page">

  

    <!-- ══════════════════════════
         AUTH CARD
    ══════════════════════════ -->
    <div class="auth-container">
      <div class="auth-card">

        <div class="auth-header">
          <h1>Tạo tài khoản mới</h1>
          <p>Đăng ký để trải nghiệm GoXe ngay hôm nay</p>
        </div>

        <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">

          <!-- Full name -->
          <div class="form-group">
            <label class="form-label" for="regName">Họ và tên</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input class="form-input" type="text" id="regName"
                     placeholder="VD: Nguyễn Minh Anh" autocomplete="name" />
            </div>
            <span class="field-error" id="nameError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Vui lòng nhập họ và tên
            </span>
          </div>

          <!-- Phone -->
          <div class="form-group">
            <label class="form-label" for="regPhone">Số điện thoại</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.04 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/>
              </svg>
              <input class="form-input" type="tel" id="regPhone"
                     placeholder="VD: 0901234567" autocomplete="tel" />
            </div>
            <span class="field-error" id="regPhoneError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Vui lòng nhập số điện thoại hợp lệ
            </span>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="regEmail">Email <span style="color:var(--gray-400);font-weight:400;">(tuỳ chọn)</span></label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input class="form-input" type="email" id="regEmail"
                     placeholder="VD: email@gmail.com" autocomplete="email" />
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="regPass">Mật khẩu</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input class="form-input" type="password" id="regPass"
                     placeholder="Tối thiểu 8 ký tự"
                     oninput="checkStrength(this.value)"
                     autocomplete="new-password" />
              <button type="button" class="pass-toggle" onclick="togglePass('regPass', this)">
                <svg id="eyeIcon-regPass" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <!-- Strength bar -->
            <div class="pass-strength" id="strengthWrap" style="display:none;">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
            <span class="field-error" id="regPassError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Mật khẩu phải có ít nhất 8 ký tự
            </span>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="regPassConfirm">Xác nhận mật khẩu</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input class="form-input" type="password" id="regPassConfirm"
                     placeholder="Nhập lại mật khẩu" autocomplete="new-password" />
              <button type="button" class="pass-toggle" onclick="togglePass('regPassConfirm', this)">
                <svg id="eyeIcon-regPassConfirm" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="confirmError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Mật khẩu xác nhận không khớp
            </span>
          </div>

          <!-- Terms -->
          <div class="form-group">
            <label class="terms-wrap">
              <input type="checkbox" id="agreeTerms" />
              <span>Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a> của GoXe</span>
            </label>
            <span class="field-error" id="termsError">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Bạn cần đồng ý với điều khoản để tiếp tục
            </span>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-auth" id="registerBtn">
            Tạo tài khoản
          </button>

          <!-- Switch -->
          <p class="auth-switch">
            Đã có tài khoản? <a href="/frontend/login.html">Đăng nhập ngay</a>
          </p>

        </form>
      </div>
    </div>

    <div class="auth-footer">
      © 2026 GoXe. Tất cả quyền được bảo lưu.
    </div>

  </div><!-- /.auth-page -->

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="/frontend/js/auth.js"></script>
</body>
</html>
